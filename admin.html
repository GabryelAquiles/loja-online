<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Aquiles SW</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f4f4; margin: 0; }
        .login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Painel Admin</h2>

        <p>Clique abaixo para acessar o painel</p>
        <button id="btn-entrar">ENTRAR NO PAINEL</button>
    </div>

    <script>

        document.getElementById("btn-entrar").onclick = () => {
            window.location.href = "admin.html";
        };
    </script>

</body>
</html>
