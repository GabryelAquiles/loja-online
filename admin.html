<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | Aquiles SW</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #f4f4f4; }
        .login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; }
        button { width: 108%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Painel Admin</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Senha">
        <button id="btn-entrar">ENTRAR</button>
    </div>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6g9nuso280y5ezxSQyyuF5EljE9raz0M",
            authDomain: "aquiles-sw-saas.firebaseapp.com",
            projectId: "aquiles-sw-saas",
            storageBucket: "aquiles-sw-saas.appspot.com",
            messagingSenderId: "878262536684",
            appId: "1:878262536684:web:e32ac0b9755ca101e398c9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("btn-entrar").onclick = () => {
            const e = document.getElementById("email").value;
            const s = document.getElementById("senha").value;
            signInWithEmailAndPassword(auth, e, s)
                .then(() => window.location.href = "admin.html")
                .catch(() => document.getElementById("mensagem-erro").style.display = "block");
        };
    </script>
</body>
</html>
